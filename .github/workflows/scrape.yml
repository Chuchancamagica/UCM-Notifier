name: Auto-Scrape UCM Grades

on:
  schedule:
    - cron: '0 * * * *' # Ejecución cada 1 hora
  workflow_dispatch: # Permite disparo manual desde la web de GitHub

permissions:
  contents: write # Otorga permisos de escritura para commitear cambios de vuelta al repositorio

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        UCM_USER: ${{ secrets.UCM_USER }}
        UCM_PASS: ${{ secrets.UCM_PASS }}
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        EMAIL_TO: ${{ secrets.EMAIL_TO }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
      run: |
        python scraper/scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add dashboard/ramos_con_detalles.json dashboard/public/images/
        # Commitear y pushear solo si hay cambios en los archivos
        if [ -n "$(git status --porcelain dashboard/)" ]; then
          git commit -m "auto: actualizar notas y gráficos"
          git push
        else
          echo "No se detectaron cambios en las notas. Saltando commit."
        fi
